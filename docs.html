<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lierda Product Documentation</title>
  <link rel="icon" type="image/png" href="assets/images/Lierda-2.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">
        <img class="logo-image" src="assets/images/Lierda-logo.png" alt="Lierda Logo">
        <div>
          <div class="logo-text" data-i18n="siteName">利尔达国际产品资料中心</div>
          <div class="logo-sub" data-i18n="siteSub">Lierda International Product Documentation</div>
        </div>
      </a>
      <div class="header-right">
        <div class="search-box" id="searchBox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="搜索文件名...">
        <div class="search-results" id="searchResults" style="display:none"></div>
      </div>
        <div class="lang-switcher" id="langSwitcher"></div>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label" data-i18n="productLine" id="sidebarLineLabel">产品线</div>
        <div class="sidebar-tree" id="sidebarTree"></div>
      </div>
    </aside>

    <main class="main-content">
    </main>
  </div>

  <div class="viewer-overlay" id="viewerOverlay">
    <div class="viewer-container">
      <div class="viewer-header">
        <span class="viewer-title" id="viewerTitle"></span>
        <div class="viewer-actions">
          <button class="viewer-download" id="viewerDownload" onclick="downloadCurrentFile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="viewer-close" onclick="closeViewer()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="viewer-body" id="viewerBody"></div>
    </div>
  </div>

  <button class="sidebar-toggle" id="sidebarToggle" title="切换侧边栏">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
