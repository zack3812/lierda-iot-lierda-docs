<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lierda - Welcome</title>
  <link rel="icon" type="image/png" href="assets/images/Lierda-2.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/intro.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">
        <img class="logo-image" src="assets/images/Lierda-logo.png" alt="Lierda Logo">
        <div>
          <div class="logo-text" data-i18n="siteName">利尔达国际产品资料中心</div>
          <div class="logo-sub" data-i18n="siteSub">Lierda International Product Documentation</div>
        </div>
      </a>
      <div class="header-right">
        <div class="lang-switcher" id="langSwitcher"></div>
      </div>
    </div>
  </header>

  <main class="intro-page">
    <section class="intro-hero intro-showcase">
      <div class="intro-hero-glow"></div>
      <div class="intro-hero-inner">
        <div class="intro-kicker">Lierda International</div>
        <h1 class="intro-hero-title" data-i18n="videoTitle">欢迎了解利尔达</h1>
        <p class="intro-hero-desc" data-i18n="introDesc">利尔达科技集团是领先的物联网产品与解决方案提供商，致力于为客户提供全方位的物联网通信模组、终端及EMS服务。</p>
      </div>
    </section>

    <section class="intro-videos">
      <div class="intro-videos-inner">
        <div class="video-card">
          <div class="video-card-label" data-i18n="videoCompany">公司介绍</div>
          <video id="videoCompany" controls playsinline preload="metadata"></video>
        </div>
        <div class="video-card">
          <div class="video-card-label" data-i18n="videoFactory">工厂介绍</div>
          <video id="videoFactory" controls playsinline preload="metadata"></video>
        </div>
      </div>
    </section>

    <section class="intro-cta">
      <div class="intro-cta-actions">
        <a class="intro-cta-btn" href="https://en.lierda.com/" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          <span data-i18n="enterWebsite">进入官网</span>
        </a>
        <a class="intro-cta-btn" href="docs.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span data-i18n="enterDocs">进入资料中心</span>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div data-i18n="footer">© 2026 利尔达科技集团 · 国际产品资料中心</div>
      <div class="footer-contact">
        <svg class="footer-mail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <a href="mailto:international@lierda.com" data-i18n="contact">产品信息请联系 international@lierda.com</a>
      </div>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/animations.js"></script>
  <script>
    const langBtns = document.getElementById('langSwitcher');
    SUPPORTED_LANGS.forEach(lang => {
      const btn = document.createElement('button');
      btn.className = 'lang-btn';
      btn.dataset.lang = lang;
      btn.textContent = I18N[lang].langName;
      btn.addEventListener('click', () => switchIntroLang(lang));
      langBtns.appendChild(btn);
    });

    function switchIntroLang(lang) {
      if (!SUPPORTED_LANGS.includes(lang)) return;
      currentLang = lang;
      localStorage.setItem('lierda-lang', lang);
      document.documentElement.lang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
    }

    switchIntroLang(currentLang);

    if (SITE_CONFIG.videos && SITE_CONFIG.videos.length > 0) {
      const videoMap = {
        company: document.getElementById('videoCompany'),
        factory: document.getElementById('videoFactory')
      };
      SITE_CONFIG.videos.forEach(v => {
        const el = videoMap[v.id];
        if (el) el.src = `${SITE_CONFIG.r2PublicUrl}/${encodeURIComponent(v.r2Key)}`;
      });
    }
  </script>
</body>
</html>
