<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PDF 查看器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #e2e8f0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pdf-container {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }
    .pdf-container canvas {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      border-radius: 2px;
      max-width: 100%;
      height: auto;
    }
    .pdf-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #64748b;
      gap: 12px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #64748b;
      gap: 12px;
      text-align: center;
      padding: 24px;
    }
    .error svg { width: 48px; height: 48px; opacity: 0.4; }
    .error a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      margin: 8px 4px;
    }
    .error a:hover { background: #1d4ed8; }
    .error a.green { background: #10b981; }
    .error a.green:hover { background: #059669; }
    @media (max-width: 768px) {
      .pdf-container {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="pdf-container" id="pdfContainer">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>正在加载文档...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fileUrl = params.get('file');
    const isEmbedded = params.get('embedded') === '1';
    const container = document.getElementById('pdfContainer');
    const loading = document.getElementById('loading');

    let pdfDoc = null;
    let currentPage = 1;
    let scale = 1.5;
    let rendering = false;
    let resizeTimer = null;

    function isMobile() {
      return window.innerWidth <= 768;
    }

    function calcFitScale(pageWidth) {
      const padding = isMobile() ? 16 : 32;
      return (container.clientWidth - padding) / pageWidth * 1.5;
    }

    if (!fileUrl) {
      container.innerHTML = '<div class="error"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>未指定文件</p></div>';
    } else {
      initViewer();
    }

    async function initViewer() {
      try {
        await initPDFJS();
      } catch (err) {
        console.log('PDF.js 加载失败，回退到浏览器内置查看器:', err);
        fallbackToBrowserViewer();
      }
    }

    async function initPDFJS() {
      const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

      pdfDoc = await pdfjsLib.getDocument(fileUrl).promise;
      setupPDFJSControls();
      loading.remove();

      if (isMobile()) {
        const firstPage = await pdfDoc.getPage(1);
        scale = calcFitScale(firstPage.getViewport({ scale: 1 }).width);
      }

      renderPage(currentPage);
    }

    function fallbackToBrowserViewer() {
      container.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.className = 'pdf-iframe';
      iframe.src = fileUrl;
      container.appendChild(iframe);
      loading.remove();
    }

    function setupPDFJSControls() {
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          if (currentPage > 1) { currentPage--; renderPage(currentPage); }
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          if (currentPage < pdfDoc?.numPages) { currentPage++; renderPage(currentPage); }
        }
      });

      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(async () => {
          if (!pdfDoc || !isMobile()) return;
          const page = await pdfDoc.getPage(currentPage);
          scale = calcFitScale(page.getViewport({ scale: 1 }).width);
          renderPage(currentPage);
        }, 200);
      });
    }

    async function renderPage(num) {
      if (rendering) return;
      rendering = true;

      try {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        container.innerHTML = '';
        container.appendChild(canvas);

        await page.render({ canvasContext: ctx, viewport }).promise;
      } finally {
        rendering = false;
      }
    }


  </script>
</body>
</html>
